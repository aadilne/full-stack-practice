<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Practice</title>
    <link rel="stylesheet" href="10_display.css">
</head>
<body>

    <h1>Display Practice</h1>

    
    <!-- Block -->
    

    <h2>1. display: block</h2>

    <div class="block-box">Block 1</div>
    <div class="block-box">Block 2</div>
    <div class="block-box">Block 3</div>


    
    <!-- Inline -->
    

    <h2>2. display: inline</h2>

    <span class="inline-box">Inline 1</span>
    <span class="inline-box">Inline 2</span>
    <span class="inline-box">Inline 3</span>


   
    <!-- Inline Block -->
   
    <h2>3. display: inline-block</h2>

    <div class="inline-block-box">Box 1</div>
    <div class="inline-block-box">Box 2</div>
    <div class="inline-block-box">Box 3</div>


   
    <!-- None -->
   

    <h2>4. display: none</h2>

    <div class="visible-box">
        Main Visible Hoon
    </div>

    <div class="none-box">
        Main Hidden Hoon
    </div>

</body>
</html>
